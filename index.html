<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Najot Edu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f6f7fb;
        z-index: 9999;
        gap: 24px;
        transition: opacity 0.4s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-logo {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #7c3aed, #a855f7);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(124,58,237,0.3);
        animation: pulse 1.8s ease-in-out infinite;
      }
      .loader-logo svg {
        width: 36px;
        height: 36px;
        fill: white;
      }
      .loader-title {
        font-family: 'Inter', sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #111;
        letter-spacing: -0.5px;
        margin: 0;
      }
      .loader-subtitle {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        color: #9ca3af;
        margin: -16px 0 0;
      }
      .loader-bar {
        width: 180px;
        height: 4px;
        background: #e5e7eb;
        border-radius: 99px;
        overflow: hidden;
      }
      .loader-bar-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #7c3aed, #a855f7);
        border-radius: 99px;
        animation: slide 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(124,58,237,0.3); }
        50% { transform: scale(1.06); box-shadow: 0 12px 40px rgba(124,58,237,0.45); }
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="app-loader">
      <div class="loader-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm0 12.5L3.26 10.5 12 5.5l8.74 5L12 15.5zM3 18.5c0 1.38 4.03 2.5 9 2.5s9-1.12 9-2.5V17l-9 4.91L3 17v1.5z"/>
        </svg>
      </div>
      <div style="text-align:center">
        <p class="loader-title">Najot Edu</p>
        <p class="loader-subtitle">LMS PLATFORM</p>
      </div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // React mount bo'lganda loaderni yashirish
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 450);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
